<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OBS Roulette</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; overflow: hidden;
    }
    .scale-wrap {
      width: 380px; opacity: 0;
      transition: opacity 0.4s; margin-bottom: 12px;
    }
    .scale-wrap.visible { opacity: 1; }
    .scale-label {
      color: #ccc; font-size: 15px; font-family: Arial;
      text-align: center; margin-bottom: 6px;
      text-shadow: 0 0 8px rgba(0,0,0,0.8);
    }
    .scale-bar-bg {
      width: 100%; height: 14px; background: rgba(0,0,0,0.5);
      border-radius: 7px; overflow: hidden; border: 1px solid #444;
    }
    .scale-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #f0c040, #ff6b35);
      border-radius: 7px; transition: width 0.6s ease;
    }
    .wheel-wrap {
      position: relative; width: 420px; height: 420px;
      opacity: 0; transform: scale(0.8);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .wheel-wrap.visible { opacity: 1; transform: scale(1); }
    canvas { border-radius: 50%; box-shadow: 0 0 40px rgba(240,192,64,0.7); }
    .arrow {
      position: absolute; top: -24px; left: 50%;
      transform: translateX(-50%); font-size: 44px;
      filter: drop-shadow(0 0 8px gold); z-index: 10;
    }
    
  </style>
</head>
<body>

<div class="scale-wrap" id="scaleWrap">
  <div class="scale-label" id="scaleLabel">0 / 150 ₴</div>
  <div class="scale-bar-bg">
    <div class="scale-bar-fill" id="scaleFill" style="width:0%"></div>
  </div>
</div>

<div class="wheel-wrap" id="wheelWrap">
  <div class="arrow">▼</div>
  <canvas id="wheel" width="420" height="420"></canvas>
</div>


<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyCw4Fr5SrDh67kHtflFSZm7EJ4T5o-neQs",
    authDomain: "roulette-twitch-2c7a3.firebaseapp.com",
    databaseURL: "https://roulette-twitch-2c7a3-default-rtdb.europe-west1.firebasedatabase.app/",
    projectId: "roulette-twitch-2c7a3"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const colors = ["#e74c3c","#3498db","#2ecc71","#f39c12","#9b59b6","#e67e22","#1abc9c","#e91e63"];

let options = [];

let goal = 150;
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const wheelWrap = document.getElementById("wheelWrap");
const resultDiv = document.createElement("div");
const scaleWrap = document.getElementById("scaleWrap");
const scaleLabel = document.getElementById("scaleLabel");
const scaleFill = document.getElementById("scaleFill");

let currentAngle = 0;
let isSpinning = false;
let hideTimer = null;

// ====== ЗАГРУЗКА ЛОТОВ ======
db.ref("options").on("value", snap => {
  if (snap.val()) {
    options = snap.val();
    drawWheel(currentAngle);
  }
});

db.ref("goal").on("value", snap => {
  if (snap.val()) goal = snap.val();
});

function getArcs() {
  const total = options.reduce((s, o) => s + (o.weight || 1), 0);
  return options.map(o => ((o.weight || 1) / total) * 2 * Math.PI);
}

function drawWheel(angle) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const radius = cx - 5;
  const arcs = getArcs();
  let startA = angle;

  for (let i = 0; i < options.length; i++) {
    const endA = startA + arcs[i];
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radius, startA, endA);
    ctx.closePath();
    ctx.fillStyle = colors[i % colors.length];
    ctx.fill();
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(startA + arcs[i] / 2);
    ctx.textAlign = "right";
    ctx.fillStyle = "#fff";
    ctx.font = "bold 17px Arial";
    ctx.shadowColor = "rgba(0,0,0,0.6)";
    ctx.shadowBlur = 4;
    ctx.fillText(options[i].label, radius - 14, 6);
    ctx.restore();
    startA = endA;
  }

  ctx.beginPath();
  ctx.arc(cx, cy, 22, 0, 2 * Math.PI);
  ctx.fillStyle = "#fff";
  ctx.fill();
}

function spinTo(index) {
  if (isSpinning) return;
  isSpinning = true;
  if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }

  wheelWrap.classList.add("visible");
  scaleWrap.classList.add("visible");

  const arcs = getArcs();

  // Начало сектора
  let sectorStart = 0;
  for (let i = 0; i < index; i++) sectorStart += arcs[i];
  
  // Середина сектора
  const sectorMid = sectorStart + arcs[index] / 2;

  // Стрелка смотрит вниз сверху = угол -PI/2 от начала отсчёта canvas
  // Нам нужно чтобы sectorMid оказался под стрелкой
  // target = угол поворота колеса при котором sectorMid окажется сверху
const target = (Math.PI / 2) - sectorMid + Math.PI;

  // Нормализуем currentAngle
  const normalizedCurrent = currentAngle % (2 * Math.PI);
  
  // Считаем разницу — всегда крутим вперёд
  let diff = target - normalizedCurrent;
  while (diff < 0) diff += 2 * Math.PI;
  while (diff > 2 * Math.PI) diff -= 2 * Math.PI;

  const extraSpins = (6 + Math.floor(Math.random() * 3)) * 2 * Math.PI;
  const finalAngle = currentAngle + diff + extraSpins;

  const duration = 4500;
  const start = performance.now();
  const startAngle = currentAngle;

  function animate(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed / duration, 1);
    const ease = 1 - Math.pow(1 - progress, 4);
    currentAngle = startAngle + (finalAngle - startAngle) * ease;
    drawWheel(currentAngle);

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
  isSpinning = false;
  // Пишем в историю ПОСЛЕ остановки — гарантированное совпадение
  db.ref("history").push({ value: options[index].label, time: Date.now() });
  hideTimer = setTimeout(() => {
  }, 6000);
}
  }
  requestAnimationFrame(animate);
}

drawWheel(0);

let lastTs = 0;
db.ref("spinCommand").on("value", snap => {
  const data = snap.val();
  if (!data || data.ts === lastTs) return;
  lastTs = data.ts;
  const index = options.findIndex(o => o.label === data.label);
  if (index !== -1) {
    setTimeout(() => {
      wheelWrap.classList.add("visible");
      scaleWrap.classList.add("visible");
      spinTo(index);
    }, 6000);
  }
});

// ====== ШКАЛА ======
db.ref("donateTotal").on("value", snap => {
  const total = snap.val() || 0;
  const pct = Math.min((total / goal) * 100, 100);
  scaleFill.style.width = pct + "%";
  scaleLabel.innerText = `${total} / ${goal} ₴`;
});
</script>
</body>
</html>
