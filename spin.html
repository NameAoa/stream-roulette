<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OBS Roulette</title>
  <link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; overflow: hidden;
    }
    .scale-wrap {
      width: 380px; opacity: 0;
      transition: opacity 0.4s; margin-bottom: 12px;
    }
    .scale-wrap.visible { opacity: 1; }
    .scale-label {
      color: #fff; font-size: 32px;
      font-family: 'Poiret One', cursive;
      text-align: center;
      text-shadow: 0 0 12px rgba(140,80,200,0.8);
      letter-spacing: 2px;
    }
    .wheel-wrap {
      position: relative; width: 420px; height: 420px;
      opacity: 0; transform: scale(0.8);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .wheel-wrap.visible { opacity: 1; transform: scale(1); }
    canvas {
      border-radius: 50%;
      box-shadow: 0 0 40px rgba(140,80,200,0.6);
    }
    .arrow-wrap {
      position: absolute; top: -18px; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.8));
    }
    .arrow-wrap svg { width: 36px; height: 52px; }
  </style>
</head>
<body>

<div class="scale-wrap" id="scaleWrap">
  <div class="scale-label" id="scaleLabel">Колесо 0/150</div>
</div>

<div class="wheel-wrap" id="wheelWrap">
  <div class="arrow-wrap">
    <svg viewBox="0 0 36 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#666"/>
          <stop offset="30%" style="stop-color:#ddd"/>
          <stop offset="60%" style="stop-color:#aaa"/>
          <stop offset="100%" style="stop-color:#555"/>
        </linearGradient>
      </defs>
      <polygon points="18,52 0,4 36,4" fill="url(#metalGrad)"/>
      <rect x="6" y="0" width="24" height="8" rx="2" fill="url(#metalGrad)" stroke="#333" stroke-width="1"/>
    </svg>
  </div>
  <canvas id="wheel" width="420" height="420"></canvas>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCw4Fr5SrDh67kHtflFSZm7EJ4T5o-neQs",
  authDomain: "roulette-twitch-2c7a3.firebaseapp.com",
  databaseURL: "https://roulette-twitch-2c7a3-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "roulette-twitch-2c7a3"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const colors = [
  "#3d1a6e", "#5a2d91", "#7b4fa6", "#9d6dbf",
  "#4a2278", "#6b3d9e", "#8c5ab5", "#b07fd4"
];

let options = [];
let goal = 150;

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const wheelWrap = document.getElementById("wheelWrap");
const scaleWrap = document.getElementById("scaleWrap");
const scaleLabel = document.getElementById("scaleLabel");
const scaleFill = document.getElementById("scaleFill");

let currentAngle = 0;
let isSpinning = false;
let hideTimer = null;

db.ref("options").on("value", snap => {
  if (snap.val()) {
    options = snap.val();
    drawWheel(currentAngle);
  }
});

db.ref("goal").on("value", snap => {
  if (snap.val()) goal = snap.val();
});

function getArcs() {
  const total = options.reduce((s, o) => s + (o.weight || 1), 0);
  return options.map(o => ((o.weight || 1) / total) * 2 * Math.PI);
}

function drawWheel(angle) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const radius = cx - 5;
  const arcs = getArcs();
  let startA = angle;

  for (let i = 0; i < options.length; i++) {
    const endA = startA + arcs[i];

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radius, startA, endA);
    ctx.closePath();

    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
    const base = colors[i % colors.length];
    grad.addColorStop(0, lighten(base, 50));
    grad.addColorStop(1, base);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.2)";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(startA + arcs[i] / 2);
    ctx.textAlign = "right";
    ctx.fillStyle = "#fff";
    ctx.font = "bold 17px Arial";
    ctx.shadowColor = "rgba(0,0,0,0.8)";
    ctx.shadowBlur = 5;
    ctx.fillText(options[i].label, radius - 14, 6);
    ctx.restore();

    startA = endA;
  }
}

function lighten(hex, amount) {
  const num = parseInt(hex.slice(1), 16);
  const r = Math.min(255, (num >> 16) + amount);
  const g = Math.min(255, ((num >> 8) & 0xff) + amount);
  const b = Math.min(255, (num & 0xff) + amount);
  return `rgb(${r},${g},${b})`;
}

function spinTo(index) {
  if (isSpinning) return;
  isSpinning = true;
  if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }

  const arcs = getArcs();
  let sectorStart = 0;
  for (let i = 0; i < index; i++) sectorStart += arcs[i];
  const sectorMid = sectorStart + arcs[index] / 2;

  const target = (Math.PI / 2) - sectorMid + Math.PI;
  const normalizedCurrent = currentAngle % (2 * Math.PI);
  let diff = target - normalizedCurrent;
  while (diff < 0) diff += 2 * Math.PI;
  while (diff > 2 * Math.PI) diff -= 2 * Math.PI;

  const extraSpins = (6 + Math.floor(Math.random() * 3)) * 2 * Math.PI;
  const finalAngle = currentAngle + diff + extraSpins;
  const duration = 4500;
  const start = performance.now();
  const startAngle = currentAngle;

  function animate(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed / duration, 1);
    const ease = 1 - Math.pow(1 - progress, 4);
    currentAngle = startAngle + (finalAngle - startAngle) * ease;
    drawWheel(currentAngle);

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      isSpinning = false;
      db.ref("history").push({ value: options[index].label, time: Date.now() });
      hideTimer = setTimeout(() => {
        wheelWrap.classList.remove("visible");
      }, 6000);
    }
  }
  requestAnimationFrame(animate);
}

drawWheel(0);

let lastTs = 0;
db.ref("spinCommand").on("value", snap => {
  const data = snap.val();
  if (!data || data.ts === lastTs) return;
  lastTs = data.ts;
  const index = options.findIndex(o => o.label === data.label);
  if (index !== -1) {
    setTimeout(() => {
      wheelWrap.classList.add("visible");
      spinTo(index);
    }, 3000);
  }
});

db.ref("donateTotal").on("value", snap => {
  const total = snap.val() || 0;
  const pct = Math.min((total / goal) * 100, 100);
  scaleLabel.innerText = `Колесо ${total}/${goal}`;
  scaleWrap.classList.add("visible");
});
</script>
</body>
</html>
