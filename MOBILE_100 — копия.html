<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎰 Пульт</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      color: white;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
    }
    h1 { font-size: 22px; letter-spacing: 3px; color: #f0c040; margin-bottom: 24px; }
    .section {
      width: 100%; max-width: 360px;
      background: #1a1a2e;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      color: #555; margin-bottom: 12px;
    }
    .scale-top { display: flex; justify-content: space-between; margin-bottom: 10px; }
    .scale-total { font-size: 22px; font-weight: bold; color: #f0c040; }
    .scale-bar-bg { width: 100%; height: 16px; background: #111; border-radius: 8px; overflow: hidden; }
    .scale-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #f0c040, #ff6b35);
      border-radius: 8px; transition: width 0.5s;
    }
    .row { display: flex; gap: 8px; margin-top: 10px; }
    .row input {
      flex: 1; padding: 10px; border-radius: 8px;
      border: 1px solid #333; background: #111;
      color: white; font-size: 16px; text-align: center;
    }
    .btn-gold {
      padding: 10px 14px; border-radius: 8px; border: none;
      background: #f0c040; color: #111; font-weight: bold;
      font-size: 14px; cursor: pointer; white-space: nowrap;
    }
    .spin-btn {
      width: 190px; height: 190px; border-radius: 50%;
      border: 4px solid #f0c040;
      background: radial-gradient(circle at 40% 35%, #f0c040, #c8860a);
      color: #111; font-size: 20px; font-weight: bold;
      letter-spacing: 2px; cursor: pointer;
      box-shadow: 0 0 40px rgba(240,192,64,0.4);
      transition: transform 0.1s; text-transform: uppercase;
    }
    .spin-btn:active { transform: scale(0.93); }
    .spin-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .cooldown { margin-top: 12px; font-size: 13px; color: #666; height: 18px; }
    .lot-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px; background: #111;
      padding: 10px 12px; border-radius: 10px;
    }
    .lot-color { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    .lot-name-input {
      flex: 1; background: transparent; border: none;
      border-bottom: 1px solid #333; color: white;
      font-size: 14px; padding: 2px 4px;
    }
    .lot-weight-input {
      width: 52px; padding: 6px; border-radius: 6px;
      border: 1px solid #333; background: #0f0f1a;
      color: white; font-size: 14px; text-align: center;
    }
    .lot-pct { font-size: 12px; color: #f0c040; width: 36px; text-align: right; }
    .lot-del { background: none; border: none; color: #555; font-size: 18px; cursor: pointer; padding: 0 4px; }
    .lot-del:hover { color: #e74c3c; }
    .btn-add {
      width: 100%; padding: 12px; margin-top: 6px;
      border: 2px dashed #333; border-radius: 10px;
      background: transparent; color: #555;
      font-size: 14px; cursor: pointer; transition: all 0.2s;
    }
    .btn-add:hover { border-color: #f0c040; color: #f0c040; }
    .btn-save {
      width: 100%; padding: 13px; margin-top: 8px;
      border: none; border-radius: 10px;
      background: #f0c040; color: #111;
      font-size: 16px; font-weight: bold; cursor: pointer;
    }
    .history-item {
      background: #111; border-left: 3px solid #f0c040;
      padding: 10px 14px; margin-bottom: 8px;
      border-radius: 0 8px 8px 0;
      display: flex; justify-content: space-between;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    #timerWrap {
      display: none;
      width: 100%; max-width: 360px;
      background: #1a1a2e;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      text-align: center;
    }
    #timerLabel {
      font-size: 12px; color: #aaa;
      letter-spacing: 1px; margin-bottom: 8px;
      text-transform: uppercase;
    }
    #timerDisplay {
      font-size: 52px; font-weight: bold;
      color: #f0c040;
      text-shadow: 0 0 20px rgba(240,192,64,0.5);
      letter-spacing: 4px;
    }
    .timer-stop-btn {
      margin-top: 12px; padding: 8px 20px;
      border-radius: 8px; border: 1px solid #333;
      background: transparent; color: #555;
      font-size: 13px; cursor: pointer;
    }
    .timer-stop-btn:hover { color: #e74c3c; border-color: #e74c3c; }
    #donatepayStatus {
      font-size: 11px; margin-top: 8px;
      padding: 6px 10px; border-radius: 6px;
      background: #111; color: #555;
    }
    #donatepayStatus.connected { color: #2ecc71; }
    #donatepayStatus.error { color: #e74c3c; }
  </style>
</head>
<body>

<h1>🎰 РУЛЕТКА</h1>

<div id="timerWrap">
  <div id="timerLabel"></div>
  <div id="timerDisplay">0:00</div>
  <div style="display:flex;gap:8px;justify-content:center;margin-top:12px;">
    <button class="timer-stop-btn" id="timerStopBtn" onclick="toggleTimer()">Пауза</button>
    <button class="timer-stop-btn" onclick="stopTimer()">Стоп</button>
  </div>
</div>

<div class="section">
  <div class="section-title">Шкала донатів</div>
  <div class="scale-top">
    <span style="color:#aaa;font-size:13px">Зібрано</span>
    <span class="scale-total"><span id="totalVal">0</span> / <span id="goalVal">150</span> ₴</span>
  </div>
  <div class="scale-bar-bg">
    <div class="scale-bar-fill" id="scaleFill" style="width:0%"></div>
  </div>
  <div class="row">
    <input type="number" id="addAmount" placeholder="+ Сума ₴" min="0">
    <button class="btn-gold" onclick="addDonate()">Додати</button>
    <button class="btn-gold" style="background:#e74c3c" onclick="resetDonate()">✕</button>
  </div>
  <div class="row">
    <input type="number" id="goalInput" placeholder="Ціль (150)" min="1">
    <button class="btn-gold" onclick="setGoal()">Змінити ціль</button>
  </div>
  <div id="donatepayStatus">DonatePay: підключення...</div>
</div>

<button class="spin-btn" id="spinBtn" onclick="manualSpin()">КРУТИТИ</button>
<div class="cooldown" id="cooldown"></div>

<div class="section" style="margin-top:24px">
  <div class="section-title">Лоти та шанси</div>
  <div id="lotsList"></div>
  <button class="btn-add" onclick="addLot()">+ Додати лот</button>
  <button class="btn-save" onclick="saveLots()">💾 Зберегти</button>
</div>

<div class="section">
  <div class="section-title">Історія</div>
  <ul id="history" style="list-style:none;"></ul>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCw4Fr5SrDh67kHtflFSZm7EJ4T5o-neQs",
  authDomain: "roulette-twitch-2c7a3.firebaseapp.com",
  databaseURL: "https://roulette-twitch-2c7a3-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "roulette-twitch-2c7a3"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const colors = ["#e74c3c","#3498db","#2ecc71","#f39c12","#9b59b6","#e67e22","#1abc9c","#e91e63"];

let options = [];
let goal = 150;
let currentTotal = 0;
let onCooldown = false;
let autoSpinInProgress = false;
let prevTotal = -1;

// --- Таймер ---
let timerInterval = null;

function startTimer(seconds) {
  if (timerInterval) clearInterval(timerInterval);
  const wrap = document.getElementById("timerWrap");
  const display = document.getElementById("timerDisplay");
  wrap.style.display = "block";
  let remaining = seconds;
  display.innerText = formatTime(remaining);
  timerInterval = setInterval(() => {
    remaining--;
    display.innerText = formatTime(remaining);
    if (remaining <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      playBeep();
      setTimeout(() => { wrap.style.display = "none"; }, 4000);
    }
  }, 1000);
}

function stopTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  document.getElementById("timerWrap").style.display = "none";
}

let timerPaused = false;
let timerRemaining = 0;

function toggleTimer() {
  const btn = document.getElementById("timerStopBtn");
  if (timerPaused) {
    timerPaused = false;
    btn.innerText = "Пауза";
    startTimer(timerRemaining);
  } else {
    timerPaused = true;
    timerRemaining = parseInt(document.getElementById("timerDisplay").innerText.split(":")[0]) * 60 + parseInt(document.getElementById("timerDisplay").innerText.split(":")[1]);
    clearInterval(timerInterval);
    timerInterval = null;
    btn.innerText = "Продовжити";
  }
}

<button class="timer-stop-btn" id="timerStopBtn" onclick="toggleTimer()">Пауза</button>
<button class="timer-stop-btn" onclick="stopTimer()">Стоп</button>

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2, "0")}`;
}

function playBeep() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.frequency.value = 880;
  g.gain.setValueAtTime(0.4, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
  o.start(ctx.currentTime);
  o.stop(ctx.currentTime + 0.8);
}

function parseTimerFromLabel(label) {
  const matchM = label.match(/(\d+)\s*(хв|мін|мин|min)/i);
  if (matchM) return parseInt(matchM[1]) * 60;
  const matchS = label.match(/(\d+)\s*(сек|sec)/i);
  if (matchS) return parseInt(matchS[1]);
  return null;
}

let lastTimerTs = 0;
db.ref("spinCommand").on("value", snap => {
  const data = snap.val();
  if (!data) return;
  const seconds = parseTimerFromLabel(data.label);
  if (seconds) {
    document.getElementById("timerLabel").innerText = data.label;
    setTimeout(() => startTimer(seconds), 30000);
  }
});

// --- Firebase ---
db.ref("options").on("value", snap => {
  if (snap.val()) options = snap.val();
  renderLots();
});

db.ref("goal").once("value", snap => {
  if (snap.val()) {
    goal = snap.val();
    document.getElementById("goalVal").innerText = goal;
  }
});

db.ref("donateTotal").on("value", snap => {
  const newTotal = snap.val() || 0;
  currentTotal = newTotal;
  updateScaleUI();
  if (prevTotal !== -1 && newTotal > prevTotal && newTotal >= goal) {
    setTimeout(() => checkAutoSpin(), 300);
  }
  prevTotal = newTotal;
});

function updateScaleUI() {
  document.getElementById("totalVal").innerText = currentTotal;
  const pct = Math.min((currentTotal / goal) * 100, 100);
  document.getElementById("scaleFill").style.width = pct + "%";
}

function addDonate() {
  const val = parseFloat(document.getElementById("addAmount").value);
  if (!val || val <= 0) return;
  db.ref("donateTotal").set(currentTotal + val);
  document.getElementById("addAmount").value = "";
}

function resetDonate() {
  if (confirm("Скинути шкалу до 0?")) db.ref("donateTotal").set(0);
}

function setGoal() {
  const val = parseInt(document.getElementById("goalInput").value);
  if (!val || val <= 0) return;
  goal = val;
  db.ref("goal").set(goal);
  document.getElementById("goalVal").innerText = goal;
  document.getElementById("goalInput").value = "";
}

function checkAutoSpin() {
  if (autoSpinInProgress) return;
  if (currentTotal < goal) return;
  autoSpinInProgress = true;
  const spinsNeeded = Math.floor(currentTotal / goal);
  const remainder = currentTotal % goal;
  db.ref("donateTotal").set(remainder);
  for (let i = 0; i < spinsNeeded; i++) {
    setTimeout(() => {
      doSpin();
      if (i === spinsNeeded - 1) {
        setTimeout(() => { autoSpinInProgress = false; }, 1000);
      }
    }, i * 9000);
  }
}

function weightedRandom() {
  const total = options.reduce((s, o) => s + (o.weight || 1), 0);
  let r = Math.random() * total;
  for (let i = 0; i < options.length; i++) {
    r -= options[i].weight;
    if (r <= 0) return i;
  }
  return options.length - 1;
}

const btn = document.getElementById("spinBtn");
const cooldownDiv = document.getElementById("cooldown");

function manualSpin() {
  if (onCooldown) return;
  doSpin();
}

function doSpin() {
  const index = weightedRandom();
  const label = options[index].label;
  const ts = Date.now();
  db.ref("spinCommand").set({ label, ts });
  startCooldown();
}

function startCooldown() {
  onCooldown = true;
  btn.disabled = true;
  let sec = 7;
  cooldownDiv.innerText = `Зачекай ${sec}с...`;
  const t = setInterval(() => {
    sec--;
    if (sec <= 0) {
      clearInterval(t);
      onCooldown = false;
      btn.disabled = false;
      cooldownDiv.innerText = "";
    } else {
      cooldownDiv.innerText = `Зачекай ${sec}с...`;
    }
  }, 1000);
}

function renderLots() {
  const list = document.getElementById("lotsList");
  list.innerHTML = "";
  const total = options.reduce((s, o) => s + (o.weight || 1), 0);
  options.forEach((opt, i) => {
    const pct = Math.round((opt.weight / total) * 100);
    const div = document.createElement("div");
    div.className = "lot-row";
    div.innerHTML = `
      <div class="lot-color" style="background:${colors[i % colors.length]}"></div>
      <input class="lot-name-input" type="text" id="name_${i}" value="${opt.label}" placeholder="Назва лоту">
      <input class="lot-weight-input" type="number" id="w_${i}" value="${opt.weight}" min="1">
      <span class="lot-pct" id="pct_${i}">${pct}%</span>
      <button class="lot-del" onclick="deleteLot(${i})">✕</button>
    `;
    list.appendChild(div);
    setTimeout(() => {
      document.getElementById("w_" + i).addEventListener("input", updatePcts);
    }, 0);
  });
}

function updatePcts() {
  const weights = options.map((_, i) => {
    const el = document.getElementById("w_" + i);
    return el ? (parseFloat(el.value) || 1) : 1;
  });
  const total = weights.reduce((s, w) => s + w, 0);
  weights.forEach((w, i) => {
    const el = document.getElementById("pct_" + i);
    if (el) el.innerText = Math.round((w / total) * 100) + "%";
  });
}

function addLot() {
  options.push({ label: "Новий лот", weight: 10 });
  renderLots();
}

function deleteLot(i) {
  if (options.length <= 2) { alert("Мінімум 2 лоти!"); return; }
  options.splice(i, 1);
  renderLots();
}

function saveLots() {
  const newOptions = [];
  let valid = true;
  options.forEach((_, i) => {
    const nameEl = document.getElementById("name_" + i);
    const wEl = document.getElementById("w_" + i);
    if (!nameEl || !wEl) return;
    const label = nameEl.value.trim();
    const weight = parseFloat(wEl.value);
    if (!label || !weight || weight <= 0) { valid = false; return; }
    newOptions.push({ label, weight });
  });
  if (!valid) { alert("Перевір назви і ваги лотів!"); return; }
  options = newOptions;
  db.ref("options").set(options);
  renderLots();
  db.ref("optionsUpdate").set({ ts: Date.now() });
  alert("Збережено! ✅");
}

db.ref("history").orderByChild("time").on("value", snap => {
  const historyList = document.getElementById("history");
  historyList.innerHTML = "";
  const data = snap.val();
  if (data) {
    const items = Object.values(data).sort((a, b) => b.time - a.time);
    items.forEach((item, i) => {
      const li = document.createElement("li");
      li.className = "history-item";
      const val = typeof item === "string" ? item : item.value;
      li.innerHTML = `<span>${val}</span><span style="color:#555;font-size:12px">#${items.length - i}</span>`;
      historyList.appendChild(li);
    });
  }
});
</script>

<!-- DonatePay via Centrifugo -->
<script src="https://cdn.jsdelivr.net/gh/centrifugal/centrifuge-js@2.8.4/dist/centrifuge.min.js"></script>
<script>
const DONATEPAY_API_KEY = "gvnLaeWqAIgr5BRyRsfWWA1B0ysYFFcNftGwAUAi3mO99nJykf3PxXyV7B5p";
const DONATEPAY_ID = 1497;
const DONATEPAY_RATES = { RUB: 2.5, USD: 43, EUR: 51, UAH: 1 };

const dpStatus = document.getElementById("donatepayStatus");

async function connectDonatePay() {
  try {
    const res = await fetch("https://donatepay.eu/api/v2/socket/token", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ access_token: DONATEPAY_API_KEY })
    });
    const data = await res.json();

    const centrifuge = new Centrifuge("wss://centrifugo.donatepay.eu:443/connection/websocket", {
      subscribeEndpoint: "https://donatepay.eu/api/v2/socket/token",
      subscribeParams: { access_token: DONATEPAY_API_KEY },
      disableWithCredentials: true
    });

    centrifuge.setToken(data.token);

    centrifuge.on("connect", () => {
      console.log("DonatePay підключено!");
      dpStatus.innerText = "DonatePay: ✅ підключено";
      dpStatus.className = "connected";
    });

    centrifuge.on("disconnect", () => {
      dpStatus.innerText = "DonatePay: відключено";
      dpStatus.className = "";
    });

    centrifuge.subscribe("$public:" + DONATEPAY_ID, function(msg) {
      console.log("DonatePay повідомлення:", msg);
      const notification = msg.data && msg.data.notification;
      if (notification && notification.type === "donation") {
        const amount = parseFloat(notification.vars.sum);
        const currency = (notification.vars.currency || "RUB").toUpperCase();
        const rate = DONATEPAY_RATES[currency] || 1;
        const uah = currency === "RUB"
          ? Math.round(amount / rate)
          : Math.round(amount * rate);
        console.log(`Донат: ${amount} ${currency} = ${uah} грн`);
        db.ref("donateTotal").once("value", snap => {
          const current = snap.val() || 0;
          db.ref("donateTotal").set(current + uah);
        });
      }
    });

    centrifuge.connect();

  } catch(e) {
    console.error("DonatePay помилка:", e);
    dpStatus.innerText = "DonatePay: ❌ помилка підключення";
    dpStatus.className = "error";
  }
}

connectDonatePay();
</script>
</body>
</html>
